worker_processes 4;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        root /usr/share/nginx/html/app;
        include /etc/nginx/mime.types;

        # Headers
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Referrer-Policy "no-referrer";
        add_header Cross-Origin-Embedder-Policy "require-corp";
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Resource-Policy "same-origin";
        add_header Origin-Agent-Cluster "?1";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # CSP: the sha256 hash whitelists the inline theme bootstrap script in index.html.
        # If that script changes, regenerate: echo -n '<script content>' | openssl dgst -sha256 -binary | openssl base64 -A
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-eRllf6mL3x6Hwvjo1j6STpmFXDcs4FPCeMO87nl71T4='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Access Control
        include /etc/nginx/access_rules.conf;

        location / {
            alias /usr/share/nginx/html/app/;
            try_files $uri $uri/ /index.html;
        }
    }
}